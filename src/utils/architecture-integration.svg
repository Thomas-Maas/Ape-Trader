<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="aN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="aSwap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1280" height="880" fill="#f8fafc"/>

  <text x="640" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Ape Trader — Integration Surface for Northcrypto</text>
  <text x="640" y="68" text-anchor="middle" font-size="13" fill="#475569">Three swap points let Northcrypto plug in their own identity, market data, and database without touching the game logic.</text>

  <!-- App box -->
  <rect x="380" y="120" width="520" height="640" rx="14" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="380" y="120" width="520" height="44" rx="14" fill="#0f172a"/>
  <rect x="380" y="146" width="520" height="18" fill="#0f172a"/>
  <text x="640" y="149" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Ape Trader application (Next.js)</text>

  <!-- UI layer -->
  <rect x="404" y="184" width="472" height="80" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="640" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">UI components</text>
  <text x="640" y="228" text-anchor="middle" font-size="11" fill="#475569">HomeScreen · GameView · GameWindow · CryptoChart</text>
  <text x="640" y="246" text-anchor="middle" font-size="11" fill="#475569">TradeControls · Scoreboard · AuthPanel · UserBadge</text>

  <!-- Game core -->
  <rect x="404" y="284" width="472" height="120" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="640" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Game core (framework-agnostic TS)</text>
  <text x="640" y="328" text-anchor="middle" font-size="11" fill="#475569">lib/game.ts  computeScore(candles, actions, finalIndex)</text>
  <text x="640" y="346" text-anchor="middle" font-size="11" fill="#475569">lib/gameConfig.ts  GAME_DURATION_S · DRIP_SPEED_MS · INITIAL_VISIBLE</text>
  <text x="640" y="366" text-anchor="middle" font-size="11" fill="#475569">Route handlers in app/api/*  (start · candle · action · end · scoreboard)</text>
  <text x="640" y="386" text-anchor="middle" font-size="11" fill="#475569">No vendor lock-in — pure Node + TypeScript</text>

  <!-- Adapters (the swap points) -->
  <rect x="404" y="420" width="472" height="80" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="640" y="444" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">Adapter / boundary modules  →  swap to Northcrypto stack</text>
  <text x="640" y="468" text-anchor="middle" font-size="11" fill="#475569">lib/auth.ts   ·   lib/db.ts   ·   utils/binance.ts (market data)</text>
  <text x="640" y="486" text-anchor="middle" font-size="11" fill="#475569">Each is small (under 60 LOC) with a stable contract.</text>

  <!-- Config -->
  <rect x="404" y="520" width="472" height="80" rx="10" fill="#fdf4ff" stroke="#a855f7"/>
  <text x="640" y="544" text-anchor="middle" font-size="13" font-weight="700" fill="#6b21a8">Environment configuration</text>
  <text x="640" y="564" text-anchor="middle" font-size="11" fill="#475569">DATABASE_URL  ·  JWT_SECRET  ·  NODE_ENV</text>
  <text x="640" y="582" text-anchor="middle" font-size="11" fill="#475569">No secrets hard-coded — set per environment via Vercel / Docker / etc.</text>

  <!-- Deploy -->
  <rect x="404" y="620" width="472" height="120" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="640" y="644" text-anchor="middle" font-size="13" font-weight="700" fill="#075985">Deployment targets</text>
  <text x="640" y="666" text-anchor="middle" font-size="11" fill="#475569">Vercel  ·  Docker container (Node 20+)  ·  Bare metal / Kubernetes</text>
  <text x="640" y="684" text-anchor="middle" font-size="11" fill="#475569">Stateless app — horizontal scaling is trivial</text>
  <text x="640" y="704" text-anchor="middle" font-size="11" fill="#475569">All state in Postgres + JWT cookie — no sticky sessions required</text>
  <text x="640" y="724" text-anchor="middle" font-size="11" fill="#475569">Build:  npm run build   ·   Run:  npm start</text>

  <!-- LEFT: Northcrypto systems -->
  <g>
    <rect x="40" y="180" width="300" height="120" rx="10" fill="#fee2e2" stroke="#dc2626"/>
    <text x="190" y="208" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Northcrypto Identity / SSO</text>
    <text x="190" y="230" text-anchor="middle" font-size="11" fill="#475569">OAuth · OIDC · existing user table</text>
    <text x="190" y="248" text-anchor="middle" font-size="11" fill="#475569">Replace bcrypt+jose JWT issuance</text>
    <text x="190" y="266" text-anchor="middle" font-size="11" fill="#475569">in /api/auth/* + lib/auth.ts</text>
    <text x="190" y="288" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="600">→ getSession() returns { uid, username }</text>
  </g>

  <g>
    <rect x="40" y="380" width="300" height="120" rx="10" fill="#fee2e2" stroke="#dc2626"/>
    <text x="190" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Northcrypto Market Data</text>
    <text x="190" y="430" text-anchor="middle" font-size="11" fill="#475569">Internal price feed / WebSocket</text>
    <text x="190" y="448" text-anchor="middle" font-size="11" fill="#475569">Replace Kraken call in</text>
    <text x="190" y="466" text-anchor="middle" font-size="11" fill="#475569">utils/binance.ts → fetchBtcCandles()</text>
    <text x="190" y="488" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="600">→ return Candle[] (OHLC)</text>
  </g>

  <g>
    <rect x="40" y="580" width="300" height="120" rx="10" fill="#fee2e2" stroke="#dc2626"/>
    <text x="190" y="608" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Northcrypto Database</text>
    <text x="190" y="630" text-anchor="middle" font-size="11" fill="#475569">Any Postgres instance (managed,</text>
    <text x="190" y="648" text-anchor="middle" font-size="11" fill="#475569">Aurora, Supabase, self-hosted...)</text>
    <text x="190" y="666" text-anchor="middle" font-size="11" fill="#475569">Point DATABASE_URL at it</text>
    <text x="190" y="688" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="600">→ create users + game_sessions tables</text>
  </g>

  <!-- swap arrows from left into adapters -->
  <line x1="340" y1="240" x2="400" y2="450" stroke="#dc2626" stroke-width="2" marker-end="url(#aSwap)"/>
  <line x1="340" y1="440" x2="400" y2="455" stroke="#dc2626" stroke-width="2" marker-end="url(#aSwap)"/>
  <line x1="340" y1="640" x2="400" y2="475" stroke="#dc2626" stroke-width="2" marker-end="url(#aSwap)"/>

  <!-- RIGHT: integration cards -->
  <g>
    <rect x="940" y="180" width="300" height="160" rx="10" fill="#ffffff" stroke="#0f172a"/>
    <text x="960" y="206" font-size="13" font-weight="700" fill="#0f172a">1 · Identity adapter</text>
    <text x="960" y="232" font-size="11" fill="#475569">File: lib/auth.ts (≈60 LOC)</text>
    <text x="960" y="252" font-size="11" fill="#475569">Contract:</text>
    <text x="960" y="270" font-size="11" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#1e293b">  getSession() → { uid, username }</text>
    <text x="960" y="288" font-size="11" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#1e293b">  setSessionCookie(token)</text>
    <text x="960" y="306" font-size="11" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#1e293b">  clearSessionCookie()</text>
    <text x="960" y="326" font-size="11" fill="#0f172a">Swap to NC SSO → callers unchanged.</text>
  </g>

  <g>
    <rect x="940" y="360" width="300" height="160" rx="10" fill="#ffffff" stroke="#0f172a"/>
    <text x="960" y="386" font-size="13" font-weight="700" fill="#0f172a">2 · Market data adapter</text>
    <text x="960" y="412" font-size="11" fill="#475569">File: utils/binance.ts</text>
    <text x="960" y="432" font-size="11" fill="#475569">Contract:</text>
    <text x="960" y="450" font-size="11" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#1e293b">  fetchBtcCandles() → Candle[]</text>
    <text x="960" y="470" font-size="11" fill="#475569">Currently calls Kraken; swap to</text>
    <text x="960" y="488" font-size="11" fill="#475569">Northcrypto’s feed or any coin.</text>
    <text x="960" y="508" font-size="11" fill="#0f172a">Fallback JSON keeps demo offline-safe.</text>
  </g>

  <g>
    <rect x="940" y="540" width="300" height="160" rx="10" fill="#ffffff" stroke="#0f172a"/>
    <text x="960" y="566" font-size="13" font-weight="700" fill="#0f172a">3 · Database adapter</text>
    <text x="960" y="592" font-size="11" fill="#475569">File: lib/db.ts (one Pool)</text>
    <text x="960" y="612" font-size="11" fill="#475569">Driver: node-postgres (pg)</text>
    <text x="960" y="632" font-size="11" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#1e293b">  pool.query(sql, params)</text>
    <text x="960" y="652" font-size="11" fill="#475569">Set DATABASE_URL → done.</text>
    <text x="960" y="672" font-size="11" fill="#475569">Migrations: 2 tables (see schema doc).</text>
    <text x="960" y="690" font-size="11" fill="#0f172a">Works with any Postgres ≥ 13.</text>
  </g>

  <!-- arrows from adapters to right cards -->
  <line x1="880" y1="450" x2="940" y2="260" stroke="#0f172a" stroke-width="1.5" marker-end="url(#aN)"/>
  <line x1="880" y1="460" x2="940" y2="440" stroke="#0f172a" stroke-width="1.5" marker-end="url(#aN)"/>
  <line x1="880" y1="470" x2="940" y2="620" stroke="#0f172a" stroke-width="1.5" marker-end="url(#aN)"/>

  <!-- footer note -->
  <rect x="40" y="800" width="1200" height="60" rx="8" fill="#0f172a"/>
  <text x="640" y="824" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Integration effort estimate</text>
  <text x="640" y="846" text-anchor="middle" font-size="12" fill="#cbd5e1">Identity swap: ~1 day  ·  Market data swap: ~½ day  ·  DB pointing: minutes  ·  Branding (logo, copy, palette): ~1 day  ·  No game-logic changes required.</text>
</svg>
