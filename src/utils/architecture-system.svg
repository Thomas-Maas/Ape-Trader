<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="880" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="640" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">Ape Trader — System Architecture</text>
  <text x="640" y="74" text-anchor="middle" font-size="14" fill="#475569">Browser-based trading game built on Next.js 16 App Router • TypeScript end-to-end</text>

  <!-- ====================== BROWSER (CLIENT) LAYER ====================== -->
  <rect x="60" y="110" width="1160" height="200" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="60" y="110" width="1160" height="36" rx="14" fill="#e0e7ff"/>
  <rect x="60" y="134" width="1160" height="12" fill="#e0e7ff"/>
  <text x="80" y="135" font-size="15" font-weight="700" fill="#3730a3">BROWSER  ·  React 19 + Next.js 16 App Router  ·  Tailwind CSS 4  ·  React Compiler</text>

  <!-- Page / layout boxes -->
  <rect x="86" y="170" width="220" height="120" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="196" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">app/page.tsx</text>
  <text x="196" y="214" text-anchor="middle" font-size="11" fill="#475569">Client component shell</text>
  <text x="196" y="232" text-anchor="middle" font-size="11" fill="#475569">Manages session + view</text>
  <text x="196" y="254" text-anchor="middle" font-size="11" fill="#1e293b">HomeScreen · AuthPanel</text>
  <text x="196" y="270" text-anchor="middle" font-size="11" fill="#1e293b">UserBadge · GameView</text>

  <rect x="326" y="170" width="240" height="120" rx="10" fill="#ecfeff" stroke="#0891b2"/>
  <text x="446" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#155e75">GameWindow / CryptoChart</text>
  <text x="446" y="214" text-anchor="middle" font-size="11" fill="#475569">Drip loop (setInterval 500ms)</text>
  <text x="446" y="232" text-anchor="middle" font-size="11" fill="#475569">Polls candles + posts actions</text>
  <text x="446" y="254" text-anchor="middle" font-size="11" fill="#1e293b">lightweight-charts v5</text>
  <text x="446" y="270" text-anchor="middle" font-size="11" fill="#1e293b">Live line series rendering</text>

  <rect x="586" y="170" width="240" height="120" rx="10" fill="#fef3c7" stroke="#d97706"/>
  <text x="706" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">TradeControls / ApeDisplay</text>
  <text x="706" y="214" text-anchor="middle" font-size="11" fill="#475569">Long / Short / Close buttons</text>
  <text x="706" y="232" text-anchor="middle" font-size="11" fill="#475569">Realized + unrealized PnL</text>
  <text x="706" y="254" text-anchor="middle" font-size="11" fill="#1e293b">Position state machine</text>
  <text x="706" y="270" text-anchor="middle" font-size="11" fill="#1e293b">Animated reaction sprites</text>

  <rect x="846" y="170" width="240" height="120" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="966" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Scoreboard / Countdown</text>
  <text x="966" y="214" text-anchor="middle" font-size="11" fill="#475569">Leaderboard (top 100)</text>
  <text x="966" y="232" text-anchor="middle" font-size="11" fill="#475569">Weekly reset timer</text>
  <text x="966" y="254" text-anchor="middle" font-size="11" fill="#1e293b">Refreshes on game end</text>
  <text x="966" y="270" text-anchor="middle" font-size="11" fill="#1e293b">+ on auth state change</text>

  <!-- Tech tags right -->
  <rect x="1106" y="170" width="100" height="22" rx="6" fill="#1e293b"/>
  <text x="1156" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">TypeScript 5</text>
  <rect x="1106" y="198" width="100" height="22" rx="6" fill="#1e293b"/>
  <text x="1156" y="214" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">React 19.2</text>
  <rect x="1106" y="226" width="100" height="22" rx="6" fill="#1e293b"/>
  <text x="1156" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Tailwind 4</text>
  <rect x="1106" y="254" width="100" height="22" rx="6" fill="#1e293b"/>
  <text x="1156" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">SSR + CSR</text>

  <!-- HTTPS connector -->
  <line x1="640" y1="310" x2="640" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <rect x="560" y="322" width="160" height="26" rx="6" fill="#0f172a"/>
  <text x="640" y="340" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">HTTPS / fetch + cookies</text>

  <!-- ====================== SERVER (NEXT.JS) LAYER ====================== -->
  <rect x="60" y="370" width="1160" height="230" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="60" y="370" width="1160" height="36" rx="14" fill="#dcfce7"/>
  <rect x="60" y="394" width="1160" height="12" fill="#dcfce7"/>
  <text x="80" y="395" font-size="15" font-weight="700" fill="#14532d">SERVER  ·  Next.js Route Handlers (Node.js runtime)  ·  Stateless functions  ·  Cookie-based auth</text>

  <!-- Auth routes -->
  <rect x="86" y="430" width="280" height="150" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="226" y="454" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Auth Routes  ·  /api/auth/*</text>
  <line x1="100" y1="464" x2="352" y2="464" stroke="#bbf7d0"/>
  <text x="100" y="484" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">POST /api/auth/register</text>
  <text x="100" y="502" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">POST /api/auth/login</text>
  <text x="100" y="520" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">POST /api/auth/logout</text>
  <text x="100" y="538" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">GET  /api/auth/me</text>
  <text x="100" y="562" font-size="11" fill="#475569">bcryptjs (hash) + jose (JWT HS256)</text>

  <!-- Game routes -->
  <rect x="386" y="430" width="320" height="150" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="546" y="454" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Game Routes  ·  /api/game/*</text>
  <line x1="400" y1="464" x2="692" y2="464" stroke="#bfdbfe"/>
  <text x="400" y="484" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">POST /api/game/start   → create session</text>
  <text x="400" y="502" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">GET  /api/game/candle  → drip next candle</text>
  <text x="400" y="520" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">POST /api/game/action  → record trade</text>
  <text x="400" y="538" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">POST /api/game/end     → settle + score</text>
  <text x="400" y="562" font-size="11" fill="#475569">Server-authoritative time gating &amp; PnL</text>

  <!-- Scoreboard route -->
  <rect x="726" y="430" width="240" height="150" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="846" y="454" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Public  ·  /api/scoreboard</text>
  <line x1="740" y1="464" x2="952" y2="464" stroke="#fde68a"/>
  <text x="740" y="484" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">GET /api/scoreboard</text>
  <text x="740" y="510" font-size="11" fill="#475569">Top 100 by highscore</text>
  <text x="740" y="528" font-size="11" fill="#475569">No auth required</text>

  <!-- Lib boxes -->
  <rect x="986" y="430" width="220" height="150" rx="10" fill="#fdf4ff" stroke="#a855f7"/>
  <text x="1096" y="454" text-anchor="middle" font-size="13" font-weight="700" fill="#6b21a8">Shared lib/</text>
  <line x1="1000" y1="464" x2="1192" y2="464" stroke="#e9d5ff"/>
  <text x="1000" y="484" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">lib/auth.ts (JWT)</text>
  <text x="1000" y="502" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">lib/db.ts (pg Pool)</text>
  <text x="1000" y="520" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">lib/game.ts (scoring)</text>
  <text x="1000" y="538" font-size="11.5" fill="#1e293b" font-family="ui-monospace, Menlo, Consolas, monospace">lib/gameConfig.ts</text>
  <text x="1000" y="562" font-size="11" fill="#475569">Reusable, framework-agnostic</text>

  <!-- ====================== DATA / EXTERNAL LAYER ====================== -->
  <line x1="226" y1="600" x2="226" y2="650" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="546" y1="600" x2="546" y2="650" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="846" y1="600" x2="846" y2="650" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="700" y1="600" x2="1080" y2="660" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,4"/>

  <rect x="60" y="660" width="1160" height="180" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="60" y="660" width="1160" height="36" rx="14" fill="#ffedd5"/>
  <rect x="60" y="684" width="1160" height="12" fill="#ffedd5"/>
  <text x="80" y="685" font-size="15" font-weight="700" fill="#9a3412">DATA + EXTERNAL  ·  Persistent storage and upstream market data</text>

  <!-- PostgreSQL -->
  <g>
    <ellipse cx="226" cy="744" rx="135" ry="14" fill="#f97316"/>
    <rect x="91" y="744" width="270" height="60" fill="#f97316"/>
    <ellipse cx="226" cy="804" rx="135" ry="14" fill="#c2410c"/>
    <ellipse cx="226" cy="744" rx="135" ry="14" fill="none" stroke="#9a3412"/>
    <text x="226" y="780" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">PostgreSQL</text>
    <text x="226" y="796" text-anchor="middle" font-size="11" fill="#fff7ed">users · game_sessions (JSONB)</text>
  </g>

  <!-- Kraken API -->
  <rect x="416" y="724" width="260" height="100" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="546" y="750" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Kraken Public OHLC API</text>
  <text x="546" y="770" text-anchor="middle" font-size="11" fill="#475569">api.kraken.com/0/public/OHLC</text>
  <text x="546" y="786" text-anchor="middle" font-size="11" fill="#475569">XBT/USD · 1-minute candles · no key</text>
  <text x="546" y="806" text-anchor="middle" font-size="11" fill="#475569">Fetched per game start</text>

  <!-- Fallback JSON -->
  <rect x="716" y="724" width="260" height="100" rx="10" fill="#fef2f2" stroke="#ef4444"/>
  <text x="846" y="750" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Fallback Candle Snapshot</text>
  <text x="846" y="770" text-anchor="middle" font-size="11" fill="#475569">utils/btc-candles-backup.json</text>
  <text x="846" y="786" text-anchor="middle" font-size="11" fill="#475569">Used when Kraken unreachable</text>
  <text x="846" y="806" text-anchor="middle" font-size="11" fill="#475569">Keeps game playable offline</text>

  <!-- Session cookie -->
  <rect x="1006" y="724" width="200" height="100" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="1106" y="750" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">Session Cookie (JWT)</text>
  <text x="1106" y="770" text-anchor="middle" font-size="11" fill="#475569">HttpOnly · SameSite=Lax</text>
  <text x="1106" y="786" text-anchor="middle" font-size="11" fill="#475569">7-day expiry · jose HS256</text>
  <text x="1106" y="806" text-anchor="middle" font-size="11" fill="#475569">Stored in browser only</text>

  <!-- Legend / footer -->
  <text x="60" y="868" font-size="11" fill="#64748b">All API endpoints are pure Next.js Route Handlers — no separate backend service. Deployable to any Node host (Vercel, Docker, bare metal). Single Postgres connection string via DATABASE_URL.</text>
</svg>
